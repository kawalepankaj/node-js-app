apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-js-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-js-app
  template:
    metadata:
      labels:
        app: node-js-app
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: node-js-app
          image: kawalepankaj/node-js-app:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: node-js-app-config
